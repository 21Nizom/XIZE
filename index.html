<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XIZE Cafe | Luckin Coffee Style</title>
    <style>
        :root {
            --luckin-blue: #2b3a8f;
            --luckin-dark: #101840;
            --luckin-orange: #f26522;
            --bg-light: #f5f6fa;
            --text-main: #212529;
            --text-muted: #868e96;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* ХЕДЕР */
        header {
            background-color: #fff;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e9ecef;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .brand {
            display: flex;
            flex-direction: column;
        }

        .brand-name {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--luckin-blue);
            letter-spacing: 0.5px;
        }

        .brand-sub {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* ГЛАВНЫЙ РАБОЧИЙ КОНТЕЙНЕР (ДВУХКОЛОНОЧНЫЙ) */
        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* БОКОВАЯ НАВИГАЦИЯ (КАТЕГОРИИ) */
        .sidebar {
            width: 85px;
            background-color: #f8f9fa;
            border-right: 1px solid #e9ecef;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .nav-item {
            padding: 16px 4px;
            text-align: center;
            font-size: 0.75rem;
            font-weight: 600;
            color: #495057;
            cursor: pointer;
            border-left: 3px solid transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            transition: all 0.2s;
        }

        .nav-item-icon {
            font-size: 1.4rem;
        }

        .nav-item.active {
            background-color: #fff;
            color: var(--luckin-blue);
            border-left-color: var(--luckin-blue);
            font-weight: 700;
        }

        /* КОНТЕНТ МЕНЮ */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            padding-bottom: 100px;
            scroll-behavior: smooth;
        }

        .category-section {
            margin-bottom: 24px;
        }

        .category-section h2 {
            font-size: 1rem;
            font-weight: 700;
            color: var(--luckin-dark);
            margin-bottom: 12px;
            padding-left: 4px;
            border-left: 3px solid var(--luckin-orange);
        }

        /* КАРТОЧКА ТОВАРА */
        .product-card {
            background-color: #fff;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 12px;
            display: flex;
            gap: 12px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
            position: relative;
        }

        .product-img {
            width: 85px;
            height: 85px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            flex-shrink: 0;
        }

        .product-details {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .product-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: #212529;
            line-height: 1.2;
            margin-bottom: 2px;
        }

        .product-tag {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .product-price {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--luckin-dark);
        }

        .product-price span {
            font-size: 0.75rem;
            font-weight: 500;
            margin-left: 2px;
        }

        .btn-add {
            background-color: var(--luckin-blue);
            color: #fff;
            border: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            font-size: 1.2rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 2px 4px rgba(43,58,143,0.3);
        }

        /* НИЖНЯЯ ПАНЕЛЬ КОРЗИНЫ */
        .cart-bar {
            position: fixed;
            bottom: 16px;
            left: 16px;
            right: 16px;
            background-color: rgba(16, 24, 64, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            height: 54px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 8px 0 20px;
            z-index: 99;
            box-shadow: 0 8px 24px rgba(16,24,64,0.3);
            transform: translateY(120%);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .cart-bar.active {
            transform: translateY(0);
        }

        .cart-info {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #fff;
        }

        .cart-icon-wrap {
            position: relative;
            font-size: 1.4rem;
        }

        .cart-badge {
            position: absolute;
            top: -6px;
            right: -10px;
            background-color: var(--luckin-orange);
            color: #fff;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 10px;
            min-width: 16px;
            text-align: center;
        }

        .cart-total-price {
            font-size: 1.15rem;
            font-weight: 700;
        }

        .btn-checkout {
            background-color: var(--luckin-blue);
            color: #fff;
            border: none;
            padding: 0 22px;
            height: 40px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
        }

        /* МОДАЛЬНОЕ ОКНО НАСТРОЕК ТОВАРА */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0,0,0,0.5);
            z-index: 200;
            display: none;
            align-items: flex-end;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background-color: #fff;
            width: 100%;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            padding: 20px;
            max-height: 85vh;
            overflow-y: auto;
            transform: translateY(100%);
            transition: transform 0.25s ease-out;
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .modal-title {
            font-size: 1.15rem;
            font-weight: 800;
            color: var(--luckin-dark);
        }

        .btn-close-modal {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--text-muted);
            cursor: pointer;
        }

        .option-group {
            margin-bottom: 16px;
        }

        .option-label {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .option-selector-chips {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .chip {
            background-color: #f1f3f5;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #495057;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .chip.active {
            background-color: #e8eefc;
            color: var(--luckin-blue);
            border-color: var(--luckin-blue);
        }

        .modal-footer {
            margin-top: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #e9ecef;
            padding-top: 16px;
        }

        .btn-submit-options {
            background-color: var(--luckin-blue);
            color: #fff;
            border: none;
            padding: 12px 32px;
            border-radius: 24px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(43,58,143,0.2);
        }

        /* ОКНО ОФОРМЛЕНИЯ КОРЗИНЫ */
        .cart-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #fff;
            z-index: 150;
            display: none;
            flex-direction: column;
        }

        .cart-modal.active {
            display: flex;
        }

        .cart-modal-header {
            padding: 16px;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .btn-back {
            background: none;
            border: none;
            font-size: 1.4rem;
            color: var(--luckin-blue);
            cursor: pointer;
        }

        .cart-items-list {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .cart-item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f1f3f5;
        }

        .cart-item-meta h4 {
            font-size: 0.95rem;
            font-weight: 700;
        }

        .cart-item-meta p {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .cart-item-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-qty {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 1px solid var(--luckin-blue);
            background: none;
            color: var(--luckin-blue);
            font-weight: 700;
            cursor: pointer;
        }

        .cart-modal-footer {
            padding: 16px;
            border-top: 1px solid #e9ecef;
            background-color: #f8f9fa;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .btn-order-now {
            width: 100%;
            background-color: var(--luckin-orange);
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <div class="brand">
            <span class="brand-name">XIZE CAFE</span>
            <span class="brand-sub">Luckin Coffee Inspiration</span>
        </div>
    </header>

    <div class="main-layout">
        <aside class="sidebar" id="sidebar-menu">
            </aside>

        <main class="content" id="menu-content">
            </main>
    </div>

    <div class="cart-bar" id="cart-floating-bar">
        <div class="cart-info" onclick="toggleCartModal(true)">
            <div class="cart-icon-wrap">
                🛒
                <span class="cart-badge" id="cart-count-badge">0</span>
            </div>
            <div class="cart-total-price" id="cart-total-display">0 <span>с.</span></div>
        </div>
        <button class="btn-checkout" onclick="toggleCartModal(true)">В корзину</button>
    </div>

    <div class="cart-modal" id="cart-manager-modal">
        <div class="cart-modal-header">
            <button class="btn-back" onclick="toggleCartModal(false)">←</button>
            <h3>Выбранные товары</h3>
        </div>
        <div class="cart-items-list" id="cart-items-container">
            </div>
        <div class="cart-modal-footer">
            <div class="summary-row">
                <span>Итого к оплате:</span>
                <span id="cart-summary-total">0 с.</span>
            </div>
            <button class="btn-order-now" onclick="placeOrderFinal()">Подтвердить заказ</button>
        </div>
    </div>

    <div class="modal-overlay" id="product-options-modal">
        <div class="modal-content" id="modal-content-area">
            </div>
    </div>

    <script>
        // БАЗА ДАННЫХ ДЛЯ ШАБЛОНА XIZE CAFE С ТЕКСТОВЫМИ ИКОНКАМИ И ФОНОМ ДЛЯ СТИЛЯ
        const categories = {
            coffee: { name: "Кофе", icon: "☕" },
            matcha: { name: "Матча", icon: "🍵" },
            drinks: { name: "Напитки", icon: "🍹" },
            fastfood: { name: "Фастфуд", icon: "🌯" },
            bakery: { name: "Десерты", icon: "🍰" }
        };

        const productsDB = {
            101: { name: "Raw coconut latte (pioneer)", price: 16, cat: "coffee", img: "☕", bg: "#e6f0fa" },
            102: { name: "Coconut ice from the American", price: 14, cat: "coffee", img: "☕", bg: "#e6f0fa" },
            103: { name: "Light coconut jasmine latte", price: 17, cat: "coffee", img: "☕", bg: "#e6f0fa" },
            104: { name: "Ice-smoked coconut latte", price: 18, cat: "coffee", img: "☕", bg: "#e6f0fa" },
            105: { name: "A Raised Coconut Trio Latte", price: 19, cat: "coffee", img: "☕", bg: "#e6f0fa" },
            106: { name: "Raw Coconut Velvet Latte", price: 17, cat: "coffee", img: "☕", bg: "#e6f0fa" },
            107: { name: "Meteorite latte", price: 18, cat: "coffee", img: "☕", bg: "#e6f0fa" },
            108: { name: "Black Sugar latte", price: 16, cat: "coffee", img: "☕", bg: "#e6f0fa" },
            110: { name: "Muscatine cheese latte", price: 19, cat: "coffee", img: "☕", bg: "#e6f0fa" },
            113: { name: "Velvet latte", price: 15, cat: "coffee", img: "☕", bg: "#e6f0fa" },
            116: { name: "Standard American Style", price: 11, cat: "coffee", img: "☕", bg: "#e6f0fa" },
            126: { name: "Cappuccino", price: 14, cat: "coffee", img: "☕", bg: "#e6f0fa" },

            201: { name: "Coconut cloud matcha", price: 17, cat: "matcha", img: "🍵", bg: "#e8f5e9" },
            202: { name: "Cheddar cheese matcha", price: 18, cat: "matcha", img: "🍵", bg: "#e8f5e9" },
            205: { name: "Matcha latte", price: 15, cat: "matcha", img: "🍵", bg: "#e8f5e9" },

            301: { name: "Little orange iced tea", price: 12, cat: "drinks", img: "🍹", bg: "#fff3e0" },
            302: { name: "Grape iced tea", price: 13, cat: "drinks", img: "🍹", bg: "#fff3e0" },
            303: { name: "Apple iced tea", price: 12, cat: "drinks", img: "🍹", bg: "#fff3e0" },
            304: { name: "Orange iced tea", price: 12, cat: "drinks", img: "🍹", bg: "#fff3e0" },
            305: { name: "Grapetweet C iced tea", price: 14, cat: "drinks", img: "🍹", bg: "#fff3e0" },
            306: { name: "Grape and lemon tea", price: 13, cat: "drinks", img: "🍹", bg: "#fff3e0" },
            307: { name: "Chilled mango sago cream", price: 16, cat: "drinks", img: "🍹", bg: "#fff3e0" },
            311: { name: "Walden blue mango yogurt", price: 16, cat: "drinks", img: "🍹", bg: "#fff3e0" },
            312: { name: "Avocado soufflé yogurt", price: 18, cat: "drinks", img: "🍹", bg: "#fff3e0" },
            314: { name: "Sweet gourd light fruit tea", price: 14, cat: "drinks", img: "🍹", bg: "#fff3e0" },
            315: { name: "Feathered light fruit", price: 14, cat: "drinks", img: "🍹", bg: "#fff3e0" },
            316: { name: "Feather jacket light body", price: 15, cat: "drinks", img: "🍹", bg: "#fff3e0" },

            401: { name: "Шаурма Классическая", price: 25, cat: "fastfood", isFood: true, img: "🌯", bg: "#fbe9e7" },
            402: { name: "Плов Лазер (Говядина)", price: 30, cat: "fastfood", isFood: true, img: "🍛", bg: "#fbe9e7" },
            403: { name: "Супер Комбо XIZE", price: 40, cat: "fastfood", isFood: true, img: "🍱", bg: "#fbe9e7" },

            501: { name: "Tilami sue cup cake", price: 14, cat: "bakery", isFood: true, img: "🧁", bg: "#fce4ec" },
            502: { name: "Banana cake", price: 12, cat: "bakery", isFood: true, img: "🍰", bg: "#fce4ec" },
            503: { name: "Honey cloud cake", price: 15, cat: "bakery", isFood: true, img: "🎂", bg: "#fce4ec" },
            504: { name: "Beef, cheese sandwich", price: 16, cat: "bakery", isFood: true, img: "🥪", bg: "#fce4ec" },
            505: { name: "Raw coconut floss", price: 13, cat: "bakery", isFood: true, img: "🥮", bg: "#fce4ec" },
            506: { name: "Basque cheese toast", price: 14, cat: "bakery", isFood: true, img: "🍞", bg: "#fce4ec" }
        };

        // СОСТОЯНИЕ КОРЗИНЫ И ТЕКУЩЕГО ВЫБРАННОГО ТОВАРА
        let cart = [];
        let currentEditingProduct = null;
        let selectedOptions = { ice: "Нормально", sugar: "100%", size: "Стандарт" };

        // ИНИЦИАЛИЗАЦИЯ И ОТРИСОВКА ИНТЕРФЕЙСА БЕЗ ОШИБОК И ССЫЛОК
        function initApp() {
            renderSidebar();
            renderCatalog();
            setupScrollSpy();
        }

        function renderSidebar() {
            const sidebar = document.getElementById("sidebar-menu");
            let html = "";
            let isFirst = true;
            for (let key in categories) {
                html += `
                    <div class="nav-item ${isFirst ? 'active' : ''}" id="nav-${key}" onclick="scrollToCategory('${key}')">
                        <span class="nav-item-icon">${categories[key].icon}</span>
                        <span>${categories[key].name}</span>
                    </div>
                `;
                isFirst = false;
            }
            sidebar.innerHTML = html;
        }

        function renderCatalog() {
            const container = document.getElementById("menu-content");
            let html = "";
            for (let catKey in categories) {
                html += `
                    <section class="category-section" id="sec-${catKey}">
                        <h2>${categories[catKey].name}</h2>
                `;
                for (let pId in productsDB) {
                    const product = productsDB[pId];
                    if (product.cat === catKey) {
                        html += `
                            <div class="product-card">
                                <div class="product-img" style="background-color: ${product.bg}">
                                    ${product.img}
                                </div>
                                <div class="product-details">
                                    <div>
                                        <div class="product-title">${product.name}</div>
                                        <div class="product-tag">Luckin Premium Choice</div>
                                    </div>
                                    <div class="product-footer">
                                        <div class="product-price">${product.price}<span>с.</span></div>
                                        <button class="btn-add" onclick="openProductConfig(${pId})">+</button>
                                    </div>
                                </div>
                            </div>
                        `;
                    }
                }
                html += `</section>`;
            }
            container.innerHTML = html;
        }

        // НАВИГАЦИЯ И СКРОЛЛСПАЙ ТАБОВ СЛЕВА
        function scrollToCategory(catKey) {
            const target = document.getElementById(`sec-${catKey}`);
            if (target) {
                target.scrollIntoView({ behavior: 'smooth' });
                updateActiveTab(catKey);
            }
        }

        function updateActiveTab(catKey) {
            document.querySelectorAll(".nav-item").forEach(el => el.classList.remove("active"));
            const currentTab = document.getElementById(`nav-${catKey}`);
            if (currentTab) currentTab.classList.add("active");
        }

        function setupScrollSpy() {
            const contentArea = document.getElementById("menu-content");
            contentArea.addEventListener("scroll", () => {
                let currentSection = "";
                document.querySelectorAll(".category-section").forEach(sec => {
                    const top = sec.offsetTop - 120;
                    if (contentArea.scrollTop >= top) {
                        currentSection = sec.id.replace("sec-", "");
                    }
                });
                if (currentSection) updateActiveTab(currentSection);
            });
        }

        // РАБОТА С ОПЦИЯМИ ТОВАРА (МОДАЛЬНОЕ ОКНО НАСТРОЕК)
        function openProductConfig(pId) {
            const product = productsDB[pId];
            currentEditingProduct = { id: pId, ...product };
            
            // Сброс опций по умолчанию
            selectedOptions = { ice: "Нормально", sugar: "100%", size: "Стандарт" };

            const modalOverlay = document.getElementById("product-options-modal");
            const contentArea = document.getElementById("modal-content-area");

            if (product.isFood) {
                // Если фастфуд/десерт — добавляем в корзину мгновенно без кастомизации льда/сахара
                addToCartFinal(pId, product.name, product.price, "Порция");
                return;
            }

            contentArea.innerHTML = `
                <div class="modal-header">
                    <div>
                        <div class="modal-title">${product.name}</div>
                        <div style="font-size:0.85rem; color:var(--luckin-orange); font-weight:700; margin-top:4px;">${product.price} с.</div>
                    </div>
                    <button class="btn-close-modal" onclick="closeModal()">×</button>
                </div>
                
                <div class="option-group">
                    <div class="option-label">Размер</div>
                    <div class="option-selector-chips">
                        <div class="chip active" onclick="setOpt(this, 'size', 'Стандарт')">Стандарт</div>
                        <div class="chip" onclick="setOpt(this, 'size', 'Большой')">Большой (+3с)</div>
                    </div>
                </div>

                <div class="option-group">
                    <div class="option-label">Температура / Лед</div>
                    <div class="option-selector-chips">
                        <div class="chip active" onclick="setOpt(this, 'ice', 'Нормально')">Нормальный лед</div>
                        <div class="chip" onclick="setOpt(this, 'ice', 'Мало льда')">Мало льда</div>
                        <div class="chip" onclick="setOpt(this, 'ice', 'Горячий')">Горячий</div>
                    </div>
                </div>

                <div class="option-group">
                    <div class="option-label">Сладость</div>
                    <div class="option-selector-chips">
                        <div class="chip active" onclick="setOpt(this, 'sugar', '100%')">Стандартная (100%)</div>
                        <div class="chip" onclick="setOpt(this, 'sugar', '70%')">70% сладости</div>
                        <div class="chip" onclick="setOpt(this, 'sugar', 'Без сахара')">Без сахара</div>
                    </div>
                </div>

                <div class="modal-footer">
                    <div style="font-size:1.1rem; font-weight:800; color:var(--luckin-dark);" id="modal-price-calc">${product.price} с.</div>
                    <button class="btn-submit-options" onclick="submitProductWithOptions()">В корзину</button>
                </div>
            `;

            modalOverlay.classList.add("active");
        }

        function closeModal() {
            document.getElementById("product-options-modal").classList.remove("active");
        }

        function setOpt(element, key, value) {
            // Переключаем активный чип в группе настроек
            element.parentElement.querySelectorAll(".chip").forEach(ch => ch.classList.remove("active"));
            element.classList.add("active");
            selectedOptions[key] = value;

            // Расчет добавочной стоимости (например за большой размер)
            let currentPrice = currentEditingProduct.price;
            if (selectedOptions.size === "Большой") currentPrice += 3;
            document.getElementById("modal-price-calc").innerText = `${currentPrice} с.`;
        }

        function submitProductWithOptions() {
            let finalPrice = currentEditingProduct.price;
            if (selectedOptions.size === "Большой") finalPrice += 3;

            const specsText = `${selectedOptions.size}, ${selectedOptions.ice}, Сахар: ${selectedOptions.sugar}`;
            addToCartFinal(currentEditingProduct.id, currentEditingProduct.name, finalPrice, specsText);
            closeModal();
        }

        // ЛОГИКА СИСТЕМЫ КОРЗИНЫ ЗАКАЗОВ
        function addToCartFinal(pId, name, price, specs) {
            // Ищем, есть ли уже товар с точно такими же модификаторами
            const existingIndex = cart.findIndex(item => item.id === pId && item.specs === specs);
            if (existingIndex > -1) {
                cart[existingIndex].qty++;
            } else {
                cart.push({ id: pId, name: name, price: price, specs: specs, qty: 1 });
            }
            updateCartUI();
        }

        function updateCartUI() {
            const bar = document.getElementById("cart-floating-bar");
            const badge = document.getElementById("cart-count-badge");
            const totalDisplay = document.getElementById("cart-total-display");

            let totalQty = 0;
            let totalPrice = 0;

            cart.forEach(item => {
                totalQty += item.qty;
                totalPrice += (item.price * item.qty);
            });

            if (totalQty > 0) {
                badge.innerText = totalQty;
                totalDisplay.innerHTML = `${totalPrice} <span>с.</span>`;
                bar.classList.add("active");
            } else {
                bar.classList.remove("active");
                toggleCartModal(false);
            }

            // Обновляем данные и внутри развернутого окна корзины
            document.getElementById("cart-summary-total").innerText = `${totalPrice} с.`;
        }

        function toggleCartModal(show) {
            const modal = document.getElementById("cart-manager-modal");
            if (show) {
                renderCartItems();
                modal.classList.add("active");
            } else {
                modal.classList.remove("active");
            }
        }

        function renderCartItems() {
            const container = document.getElementById("cart-items-container");
            if (cart.length === 0) {
                container.innerHTML = `<div style="text-align:center; color:var(--text-muted); margin-top:40px;">Корзина пуста</div>`;
                return;
            }

            let html = "";
            cart.forEach((item, index) => {
                html += `
                    <div class="cart-item-row">
                        <div class="cart-item-meta">
                            <h4>${item.name}</h4>
                            <p>${item.specs}</p>
                            <div style="font-weight:700; font-size:0.9rem; margin-top:4px; color:var(--luckin-blue);">${item.price * item.qty} с.</div>
                        </div>
                        <div class="cart-item-controls">
                            <button class="btn-qty" onclick="changeQty(${index}, -1)">-</button>
                            <span style="font-weight:700; font-size:0.95rem;">${item.qty}</span>
                            <button class="btn-qty" onclick="changeQty(${index}, 1)">+</button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function changeQty(index, delta) {
            cart[index].qty += delta;
            if (cart[index].qty <= 0) {
                cart.splice(index, 1);
            }
            updateCartUI();
            renderCartItems();
        }

        function placeOrderFinal() {
            alert("Заказ успешно отправлен! Спасибо за покупку в XIZE Cafe!");
            cart = [];
            updateCartUI();
        }

        // Старт системы
        window.onload = initApp;
    </script>
</body>
</html>
