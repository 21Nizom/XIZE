<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XIZE Cafe</title>
    <style>
        /* Базовые стили для проверки (если у тебя были свои, они заменятся, 
           но сетка карточек настроена стандартно под Luckin стиль) */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 15px;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
            padding: 10px 0;
        }
        .product-card {
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }
        .product-img-box {
            width: 100%;
            height: 140px;
            background-color: #f1f3f5;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .product-img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .product-info {
            padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            flex-grow: 1;
        }
        .product-name {
            font-size: 0.95rem;
            font-weight: 600;
            color: #212529;
            margin-bottom: 2px;
        }
        .product-desc {
            font-size: 0.75rem;
            color: #868e96;
            margin-bottom: 8px;
        }
        .product-price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .price {
            font-size: 1.1rem;
            font-weight: 700;
            color: #f03e3e;
        }
        .price span {
            font-size: 0.8rem;
            margin-left: 2px;
        }
        .btn-count {
            background: #3b5bdb;
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <div id="products-container"></div>

    <script>
        // === ЛОКАЛЬНАЯ БАЗА ДАННЫХ (Пути ведут в твою папочку img) ===
        const productsDB = {
            // ☕ КОФЕ
            101: { name: "Raw coconut latte (pioneer)", price: 16, cat: "coffee", img: "img/coffee.png" },
            102: { name: "Coconut ice from the American", price: 14, cat: "coffee", img: "img/coffee.png" },
            103: { name: "Light coconut jasmine latte", price: 17, cat: "coffee", img: "img/coffee.png" },
            104: { name: "Ice-smoked coconut latte", price: 18, cat: "coffee", img: "img/coffee.png" },
            105: { name: "A Raised Coconut Trio Latte", price: 19, cat: "coffee", img: "img/coffee.png" },
            106: { name: "Raw Coconut Velvet Latte", price: 17, cat: "coffee", img: "img/coffee.png" },
            107: { name: "Meteorite latte", price: 18, cat: "coffee", img: "img/coffee.png" },
            108: { name: "Black Sugar latte", price: 16, cat: "coffee", img: "img/coffee.png" },
            110: { name: "Muscatine cheese latte", price: 19, cat: "coffee", img: "img/coffee.png" },
            113: { name: "Velvet latte", price: 15, cat: "coffee", img: "img/coffee.png" },
            116: { name: "Standard American Style", price: 11, cat: "coffee", img: "img/coffee.png" },
            126: { name: "Cappuccino", price: 14, cat: "coffee", img: "img/coffee.png" },

            // 🍵 МАТЧА
            201: { name: "Coconut cloud matcha", price: 17, cat: "matcha", img: "img/matcha.png" },
            202: { name: "Cheddar cheese matcha", price: 18, cat: "matcha", img: "img/matcha.png" },
            205: { name: "Matcha latte", price: 15, cat: "matcha", img: "img/matcha.png" },

            // 🍹 ЧАИ / ЙОГУРТЫ
            301: { name: "Little orange iced tea", price: 12, cat: "drinks", img: "img/drink.png" },
            302: { name: "Grape iced tea", price: 13, cat: "drinks", img: "img/drink.png" },
            303: { name: "Apple iced tea", price: 12, cat: "drinks", img: "img/drink.png" },
            304: { name: "Orange iced tea", price: 12, cat: "drinks", img: "img/drink.png" },
            305: { name: "Grapetweet C iced tea", price: 14, cat: "drinks", img: "img/drink.png" },
            306: { name: "Grape and lemon tea", price: 13, cat: "drinks", img: "img/drink.png" },
            307: { name: "Chilled mango sago cream", price: 16, cat: "drinks", img: "img/drink.png" },
            311: { name: "Walden blue mango yogurt", price: 16, cat: "drinks", img: "img/drink.png" },
            312: { name: "Avocado soufflé yogurt", price: 18, cat: "drinks", img: "img/drink.png" },
            314: { name: "Sweet gourd light fruit tea", price: 14, cat: "drinks", img: "img/drink.png" },
            315: { name: "Feathered light fruit", price: 14, cat: "drinks", img: "img/drink.png" },
            316: { name: "Feather jacket light body", price: 15, cat: "drinks", img: "img/drink.png" },

            // 🌯 ФАСТФУД
            401: { name: "Шаурма Классическая", price: 25, cat: "fastfood", isFood: true, img: "img/shaurma.png" },
            402: { name: "Плов Лазер (Говядина)", price: 30, cat: "fastfood", isFood: true, img: "img/plov.png" },
            403: { name: "Супер Комбо XIZE", price: 40, cat: "fastfood", isFood: true, img: "img/combo.png" },

            // 🍰 ДЕСЕРТЫ
            501: { name: "Tilami sue cup cake", price: 14, cat: "bakery", isFood: true, img: "img/cake.png" },
            502: { name: "Banana cake", price: 12, cat: "bakery", isFood: true, img: "img/cake.png" },
            503: { name: "Honey cloud cake", price: 15, cat: "bakery", isFood: true, img: "img/cake.png" },
            504: { name: "Beef, cheese sandwich", price: 16, cat: "bakery", isFood: true, img: "img/sandwich.png" },
            505: { name: "Raw coconut floss", price: 13, cat: "bakery", isFood: true, img: "img/cake.png" },
            506: { name: "Basque cheese toast", price: 14, cat: "bakery", isFood: true, img: "img/cake.png" }
        };

        // === ФУНКЦИЯ ОТРИСОВКИ КАРТОЧЕК ===
        function renderProducts(catKey, container) {
            let html = `<div class="products-grid">`;
            
            for (let pId in productsDB) {
                const p = productsDB[pId];
                if (p.cat === catKey) {
                    html += `
                        <div class="product-card" data-id="${pId}" onclick="handleCardClick(${pId})">
                            <div class="product-img-box">
                                <img src="${p.img}" alt="${p.name}">
                            </div>
                            <div class="product-info">
                                <div>
                                    <div class="product-name">${p.name}</div>
                                    <div class="product-desc">Luckin Choice • Премиум</div>
                                </div>
                                <div class="product-price-row">
                                    <div class="price">${p.price}<span>с.</span></div>
                                    <div class="control-buttons">
                                        <button class="btn-count btn-plus">+</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }
            }
            html += `</div>`;
            container.innerHTML = html;
        }

        // Заглушка для клика, чтобы код не выдавал ошибку при нажатии на карточку
        function handleCardClick(pId) {
            console.log("Кликнули на товар с ID:", pId);
        }

        // Автоматически запускаем отрисовку категории "coffee" в наш контейнер для проверки
        const container = document.getElementById('products-container');
        renderProducts('coffee', container);
    </script>
</body>
</html>
