<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XIZE Premium</title>
    <style>
        :root {
            --luckin-blue: #0b1430;       
            --luckin-light-blue: #162454; 
            --luckin-orange: #00f0ff;     
            --bg-dark: #060b1e;           
            --card-bg: #121f4d;           
            --text-light: #ffffff;        
            --text-muted: #7a8ebf;        
            --neon-glow: 0 0 15px rgba(0, 240, 255, 0.7); 
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: var(--luckin-blue);
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-bottom: 1px solid rgba(0, 240, 255, 0.2);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-name {
            font-size: 1.4rem;
            font-weight: 900;
            color: #fff;
            letter-spacing: 0.5px;
            text-shadow: var(--neon-glow);
        }

        .search-container {
            width: 100%;
            position: relative;
        }

        .search-input {
            width: 100%;
            background-color: var(--luckin-light-blue);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 20px;
            padding: 8px 16px;
            color: #fff;
            font-size: 0.9rem;
            outline: none;
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        .search-input:focus {
            border-color: var(--luckin-orange);
            box-shadow: var(--neon-glow);
        }

        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
            background-color: var(--bg-dark);
        }

        .sidebar {
            width: 85px;
            background-color: rgba(11, 20, 48, 0.6);
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .nav-item {
            padding: 18px 4px;
            text-align: center;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            border-left: 4px solid transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .nav-item-icon {
            font-size: 1.5rem;
        }

        .nav-item.active {
            background-color: var(--card-bg);
            color: var(--luckin-orange);
            border-left-color: var(--luckin-orange);
            font-weight: 700;
            text-shadow: var(--neon-glow);
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            padding-bottom: 140px;
            scroll-behavior: smooth;
        }

        .category-section {
            margin-bottom: 24px;
        }

        .category-section h2 {
            font-size: 1.05rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 12px;
            padding-left: 6px;
            border-left: 4px solid var(--luckin-orange);
            text-shadow: var(--neon-glow);
        }

        .product-card {
            background-color: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 12px;
            display: flex;
            gap: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            position: relative;
        }

        .product-img {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            flex-shrink: 0;
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .product-details {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .product-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-light);
            line-height: 1.3;
            padding-right: 24px;
        }

        .btn-fav {
            position: absolute;
            top: 12px;
            right: 12px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.1rem;
            cursor: pointer;
        }

        .btn-fav.active {
            color: #ff3b30;
            filter: drop-shadow(0 0 5px rgba(255,59,48,0.6));
        }

        .product-tag {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .product-price {
            font-size: 1.15rem;
            font-weight: 800;
            color: #fff;
        }

        .product-price span {
            font-size: 0.8rem;
            margin-left: 2px;
            color: var(--text-muted);
        }

        .btn-add {
            background-color: var(--luckin-orange);
            color: #060b1e;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-size: 1.2rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: var(--neon-glow);
        }

        .app-screen {
            display: none;
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            text-align: center;
        }

        .app-screen.active {
            display: block;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 65px;
            background-color: var(--luckin-blue);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
            box-shadow: 0 -5px 25px rgba(0,0,0,0.6);
        }

        .bottom-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            gap: 4px;
            flex: 1;
            height: 100%;
        }

        .bottom-nav-item.active {
            color: var(--luckin-orange);
            font-weight: 700;
            text-shadow: var(--neon-glow);
        }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0,0,0,0.7);
            z-index: 200;
            display: none;
            align-items: flex-end;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background-color: var(--luckin-blue);
            border-top: 2px solid var(--luckin-orange);
            width: 100%;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            padding: 20px;
            max-height: 85vh;
            overflow-y: auto;
            text-align: left;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 1.15rem;
            font-weight: 800;
        }

        .btn-close-modal {
            background: none;
            border: none;
            font-size: 1.6rem;
            color: var(--text-muted);
            cursor: pointer;
        }

        .option-group {
            margin-bottom: 18px;
        }

        .option-label {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .option-selector-chips {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .chip {
            background-color: var(--luckin-light-blue);
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.2s;
        }

        .chip.active {
            background-color: rgba(0, 240, 255, 0.2);
            color: var(--luckin-orange);
            border-color: var(--luckin-orange);
            box-shadow: var(--neon-glow);
        }

        .modal-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .modal-price-label {
            font-size: 1.3rem;
            font-weight: 800;
            color: #fff;
        }

        .btn-submit-options {
            background-color: #0055ff;
            color: #ffffff;
            border: none;
            padding: 12px 28px;
            border-radius: 20px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
        }

        .chip.pay-dc.active {
            background-color: #0072ff !important;
            border-color: #00d2ff !important;
            color: #ffffff !important;
            box-shadow: 0 0 15px rgba(0, 114, 255, 0.8) !important;
        }
        .chip.pay-alif.active {
            background-color: #2ecc71 !important;
            border-color: #27ae60 !important;
            color: #ffffff !important;
            box-shadow: 0 0 15px rgba(46, 204, 113, 0.8) !important;
        }

        .cart-bar {
            position: fixed;
            bottom: 80px;
            left: 16px;
            right: 16px;
            background-color: var(--luckin-light-blue);
            border: 1px solid rgba(0, 240, 255, 0.3);
            border-radius: 30px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 8px 0 20px;
            z-index: 99;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            transform: translateY(150%);
            transition: transform 0.3s ease-in-out;
        }

        .cart-bar.active {
            transform: translateY(0);
        }

        .cart-info {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
        }

        .cart-badge {
            background-color: var(--luckin-orange);
            color: #060b1e;
            font-size: 0.75rem;
            font-weight: 800;
            padding: 2px 7px;
            border-radius: 10px;
        }

        .btn-checkout {
            background-color: var(--luckin-orange);
            color: #060b1e;
            border: none;
            padding: 0 18px;
            height: 36px;
            border-radius: 18px;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
        }

        .cart-modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--bg-dark);
            z-index: 150;
            display: none;
            flex-direction: column;
        }

        .cart-modal.active {
            display: flex;
        }

        .cart-modal-header {
            padding: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            gap: 16px;
            background-color: var(--luckin-blue);
        }

        .btn-back {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: #fff;
            cursor: pointer;
        }

        .cart-items-list {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .cart-item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 12px;
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            margin-bottom: 10px;
        }

        .cart-item-meta h4 {
            font-size: 0.95rem;
            font-weight: 700;
        }

        .cart-item-meta p {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .cart-item-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-qty {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: 1px solid var(--luckin-orange);
            background: none;
            color: var(--luckin-orange);
            font-weight: 700;
            cursor: pointer;
        }

        .payment-selection-box {
            background: var(--luckin-blue);
            padding: 16px;
            border-radius: 14px;
            margin-top: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .cart-modal-footer {
            padding: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            background-color: var(--luckin-blue);
            padding-bottom: 30px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 14px;
        }

        .btn-order-now {
            width: 100%;
            background-color: var(--luckin-orange);
            color: #060b1e;
            border: none;
            padding: 14px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: var(--neon-glow);
        }

        .qr-modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(6, 11, 30, 0.95);
            z-index: 300;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .qr-modal.active {
            display: flex;
        }
        .qr-container-box {
            background-color: var(--luckin-blue);
            border: 2px solid var(--luckin-orange);
            box-shadow: var(--neon-glow);
            border-radius: 20px;
            padding: 25px;
            width: 100%;
            max-width: 340px;
            text-align: center;
        }
        .qr-image-wrapper {
            background: #fff;
            padding: 12px;
            border-radius: 12px;
            display: inline-block;
            margin: 20px 0;
        }
        .qr-image-wrapper img {
            display: block;
            width: 200px;
            height: 200px;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <div class="brand-name">XIZE Premium</div>
        </div>
        <div class="search-container" id="search-bar-wrapper" style="display:none;">
            <input type="text" class="search-input" id="menu-search-input" placeholder="Поиск любимого кофе или десерта..." oninput="handleSearch()">
        </div>
    </header>

    <div id="screen-home" class="app-screen active">
        <div style="margin-top: 80px;">
            <span style="font-size: 4.5rem; filter: drop-shadow(0 0 15px rgba(0,240,255,0.4));">⚡</span>
            <h2 style="margin-top: 20px; font-size: 1.7rem; text-shadow: var(--neon-glow);">XIZE Premium</h2>
            <p style="color: var(--text-muted); margin-top: 12px; padding: 0 25px; font-size: 0.9rem;">Насыщенный синий стиль и премиальный выбор.</p>
            <button onclick="switchMainScreen('menu')" style="margin-top: 35px; background: var(--luckin-orange); color:#060b1e; border:none; padding:14px 35px; border-radius:25px; font-weight:700; cursor:pointer; box-shadow: var(--neon-glow);">Открыть Меню</button>
        </div>
    </div>

    <div id="screen-menu" class="main-layout app-screen" style="padding:0; text-align:left;">
        <aside class="sidebar" id="sidebar-menu"></aside>
        <main class="content" id="menu-content"></main>
    </div>

    <div id="screen-profile" class="app-screen" style="text-align:left;">
        <div style="text-align: center; margin-top: 20px; margin-bottom: 30px;">
            <div style="width: 80px; height: 80px; background: var(--card-bg); border-radius: 50%; margin: 0 auto; display:flex; align-items:center; justify-content:center; font-size: 2.2rem; border: 2px solid var(--luckin-orange); box-shadow: var(--neon-glow);">👤</div>
            <h3 style="margin-top: 12px; font-size: 1.2rem;">Постоянный Гость</h3>
            <p style="color: var(--luckin-orange); font-size: 0.8rem; font-weight:700;">XIZE Club</p>
        </div>
        <h3 style="font-size:1.1rem; border-left:4px solid #ff3b30; padding-left:8px; margin-bottom:15px; text-shadow: 0 0 10px rgba(255,59,48,0.4);">❤️ Моё Избранное</h3>
        <div id="favorites-container"></div>
    </div>

    <div class="cart-bar" id="cart-floating-bar">
        <div class="cart-info" onclick="toggleCartModal(true)">
            <span>🛒 Корзина</span>
            <span class="cart-badge" id="cart-count-badge">0</span>
        </div>
        <div style="display:flex; align-items:center; gap:15px;">
            <div style="font-weight:800; font-size:1.1rem;" id="cart-total-display">0 с.</div>
            <button class="btn-checkout" onclick="toggleCartModal(true)">Открыть</button>
        </div>
    </div>

    <div class="cart-modal" id="cart-manager-modal">
        <div class="cart-modal-header">
            <button class="btn-back" onclick="toggleCartModal(false)">←</button>
            <h3 style="font-size:1.1rem; text-shadow: var(--neon-glow);">Ваш Заказ</h3>
        </div>
        <div class="cart-items-list">
            <div id="cart-items-container"></div>
            
            <div class="payment-selection-box" id="payment-box-section" style="display:none;">
                <div class="option-label" style="margin-bottom:10px;">Способ оплаты</div>
                <div class="option-selector-chips">
                    <div class="chip pay-dc active" onclick="setPaymentMethod(this, 'Dushanbe City')">DC Wallet</div>
                    <div class="chip pay-alif" onclick="setPaymentMethod(this, 'Alif Mobi')">Alif Mobi</div>
                    <div class="chip" onclick="setPaymentMethod(this, 'На кассе')">На кассе</div>
                </div>
            </div>
        </div>
        <div class="cart-modal-footer">
            <div class="summary-row">
                <span>Всего к оплате:</span>
                <span id="cart-summary-total" style="color:var(--luckin-orange); text-shadow:var(--neon-glow);">0 с.</span>
            </div>
            <button class="btn-order-now" onclick="placeOrderFinal()">Заказать сейчас</button>
        </div>
    </div>

    <div class="modal-overlay" id="product-options-modal">
        <div class="modal-content" id="modal-content-area"></div>
    </div>

    <div class="qr-modal" id="order-qr-modal">
        <div class="qr-container-box">
            <h3 style="font-size: 1.25rem; text-shadow: var(--neon-glow);">Ваш QR-код готов!</h3>
            <p style="color: var(--text-muted); font-size: 0.85rem; margin-top: 4px;" id="qr-payment-method-status">Оплата через: DC Wallet</p>
            <div class="qr-image-wrapper">
                <img id="qr-code-image-element" src="" alt="XIZE Order QR">
            </div>
            <div style="color: #fff; font-weight: 700; font-size: 1.1rem; margin-bottom: 20px;" id="qr-modal-total-price">0 с.</div>
            <button class="btn-order-now" onclick="cancelAndReturnToCart()" style="background:#7a8ebf; color:#060b1e; box-shadow:none;">Изменить оплату</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="bottom-nav-item active" id="btn-nav-home" onclick="switchMainScreen('home')"><span>🏠</span><span>Главная</span></div>
        <div class="bottom-nav-item" id="btn-nav-menu" onclick="switchMainScreen('menu')"><span>📋</span><span>Menu</span></div>
        <div class="bottom-nav-item" id="btn-nav-profile" onclick="switchMainScreen('profile')"><span>👤</span><span>Профиль</span></div>
    </nav>

        };

        let cart = [];
        let favorites = JSON.parse(localStorage.getItem('xize_favs')) || [];
        let currentEditingProduct = null;
        let selectedOptions = { ice: "Нормально", sugar: "100%", size: "Средний" };
        let selectedPaymentMethod = "Dushanbe City";
        let currentActiveTab = "home";

        window.onload = function() {
            renderSidebar();
            renderCatalog();
            setupScrollSpy();
            renderFavorites();
        };

        function switchMainScreen(screenName) {
            currentActiveTab = screenName;
            document.querySelectorAll(".app-screen").forEach(el => {
                el.classList.remove("active");
                el.style.display = "none";
            });
            document.querySelectorAll(".bottom-nav-item").forEach(el => el.classList.remove("active"));

            const targetScreen = document.getElementById(`screen-${screenName}`);
            const targetButton = document.getElementById(`btn-nav-${screenName}`);
            const searchBar = document.getElementById("search-bar-wrapper");
            
            if (screenName === 'menu') {
                targetScreen.style.display = "flex";
                searchBar.style.display = "block";
            } else {
                targetScreen.style.display = "block";
                searchBar.style.display = "none";
            }
            
            targetScreen.classList.add("active");
            if (targetButton) targetButton.classList.add("active");
            if (screenName === 'profile') renderFavorites();
        }

        function renderSidebar() {
            const sidebar = document.getElementById("sidebar-menu");
            let html = "";
            let isFirst = true;
            for (let key in categories) {
                html += `<div class="nav-item ${isFirst ? 'active' : ''}" id="nav-${key}" onclick="scrollToCategory('${key}')"><span class="nav-item-icon">${categories[key].icon}</span><span>${categories[key].name}</span></div>`;
                isFirst = false;
            }
            sidebar.innerHTML = html;
        }

        function renderCatalog(filterText = "") {
            const container = document.getElementById("menu-content");
            let html = "";
            const search = filterText.toLowerCase().trim();

            for (let catKey in categories) {
                let sectionHtml = "";
                let hasVisibleItems = false;

                for (let pId in productsDB) {
                    const product = productsDB[pId];
                    if (product.cat === catKey) {
                        if (search && !product.name.toLowerCase().includes(search)) continue;
                        hasVisibleItems = true;
                        const isFav = favorites.includes(parseInt(pId));

                        sectionHtml += `
                            <div class="product-card">
                                <button class="btn-fav ${isFav ? 'active' : ''}" onclick="toggleFav(event, ${pId})">❤️</button>
                                <div class="product-img">${product.img}</div>
                                <div class="product-details">
                                    <div>
                                        <div class="product-title">${product.name}</div>
                                        <div class="product-tag">Premium Choice</div>
                                    </div>
                                    <div class="product-footer">
                                        <div class="product-price">${product.price}<span>с.</span></div>
                                        <button class="btn-add" onclick="openProductConfig(${pId})">+</button>
                                    </div>
                                </div>
                            </div>`;
                    }
                }

                if (hasVisibleItems) {
                    html += `<section class="category-section" id="sec-${catKey}"><h2>${categories[catKey].name}</h2>${sectionHtml}</section>`;
                }
            }
            container.innerHTML = html || `<div style="text-align:center;color:var(--text-muted);margin-top:40px;">Ничего не найдено</div>`;
        }

        function handleSearch() {
            const val = document.getElementById("menu-search-input").value;
            renderCatalog(val);
        }

        function toggleFav(event, pId) {
            event.stopPropagation();
            pId = parseInt(pId);
            const idx = favorites.indexOf(pId);
            if (idx > -1) favorites.splice(idx, 1);
            else favorites.push(pId);
            
            localStorage.setItem('xize_favs', JSON.stringify(favorites));
            renderCatalog(document.getElementById("menu-search-input").value);
            if (currentActiveTab === 'profile') renderFavorites();
        }

        function renderFavorites() {
            const container = document.getElementById("favorites-container");
            if (favorites.length === 0) {
                container.innerHTML = `<div style="color:var(--text-muted); font-size:0.9rem; padding-left:5px;">Здесь будут ваши любимые товары. Нажмите ❤️ на товаре в меню!</div>`;
                return;
            }
            let html = "";
            favorites.forEach(pId => {
                const product = productsDB[pId];
                if (product) {
                    html += `
                        <div class="product-card">
                            <button class="btn-fav active" onclick="toggleFav(event, ${pId})">❤️</button>
                            <div class="product-img">${product.img}</div>
                            <div class="product-details">
                                <div>
                                    <div class="product-title">${product.name}</div>
                                </div>
                                <div class="product-footer">
                                    <div class="product-price">${product.price}<span>с.</span></div>
                                    <button class="btn-add" onclick="openProductConfig(${pId})">+</button>
                                </div>
                            </div>
                        </div>`;
                }
            });
            container.innerHTML = html;
        }

        function scrollToCategory(catKey) {
            const target = document.getElementById(`sec-${catKey}`);
            if (target) {
                target.scrollIntoView({ behavior: 'smooth' });
                updateActiveTab(catKey);
            }
        }

        function updateActiveTab(catKey) {
            document.querySelectorAll(".nav-item").forEach(el => el.classList.remove("active"));
            const currentTab = document.getElementById(`nav-${catKey}`);
            if (currentTab) currentTab.classList.add("active");
        }

        function setupScrollSpy() {
            const contentArea = document.getElementById("menu-content");
            contentArea.addEventListener("scroll", () => {
                if (currentActiveTab !== 'menu' || document.getElementById("menu-search-input").value !== "") return;
                let currentSection = "";
                document.querySelectorAll(".category-section").forEach(sec => {
                    const top = sec.offsetTop - 140;
                    if (contentArea.scrollTop >= top) currentSection = sec.id.replace("sec-", "");
                });
                if (currentSection) updateActiveTab(currentSection);
            });
        }

        function openProductConfig(pId) {
            const product = productsDB[pId];
            currentEditingProduct = { id: pId, ...product };
            selectedOptions = { ice: "Нормально", sugar: "100%", size: "Средний" };

            if (product.isFood) {
                addToCartFinal(pId, product.name, product.price, "Порция");
                return;
            }

            const modalOverlay = document.getElementById("product-options-modal");
            const contentArea = document.getElementById("modal-content-area");

            contentArea.innerHTML = `
                <div class="modal-header">
                    <div>
                        <div class="modal-title">${product.name}</div>
                    </div>
                    <button class="btn-close-modal" onclick="closeModal()">×</button>
                </div>
                
                <div class="option-group">
                    <div class="option-label">Размер</div>
                    <div class="option-selector-chips">
                        <div class="chip" onclick="setOpt(this, 'size', 'Маленький')">Маленький</div>
                        <div class="chip active" onclick="setOpt(this, 'size', 'Средний')">Средний</div>
                        <div class="chip" onclick="setOpt(this, 'size', 'Большой')">Большой (+3с)</div>
                    </div>
                </div>

                <div class="option-group">
                    <div class="option-label">Температура</div>
                    <div class="option-selector-chips">
                        <div class="chip active" onclick="setOpt(this, 'temp', 'Холодный')">Холодный</div>
                        <div class="chip" onclick="setOpt(this, 'temp', 'Горячий')">Горячий</div>
                    </div>
                </div>

                <div class="option-group">
                    <div class="option-label">Сахар</div>
                    <div class="option-selector-chips">
                        <div class="chip" onclick="setOpt(this, 'sugar', '0%')">0%</div>
                        <div class="chip" onclick="setOpt(this, 'sugar', '30%')">30%</div>
                        <div class="chip" onclick="setOpt(this, 'sugar', '50%')">50%</div>
                        <div class="chip" onclick="setOpt(this, 'sugar', '70%')">70%</div>
                        <div class="chip active" onclick="setOpt(this, 'sugar', '100%')">100%</div>
                    </div>
                </div>

                <div class="option-group">
                    <div class="option-label">Лед</div>
                    <div class="option-selector-chips">
                        <div class="chip" onclick="setOpt(this, 'ice', 'Без льда')">Без льда</div>
                        <div class="chip" onclick="setOpt(this, 'ice', 'Мало льда')">Мало льда</div>
                        <div class="chip active" onclick="setOpt(this, 'ice', 'Нормально')">Нормально</div>
                    </div>
                </div>

                <div class="modal-footer">
                    <div class="modal-price-label" id="modal-price-calc">${product.price} с.</div>
                    <button class="btn-submit-options" onclick="submitProductWithOptions()">Добавить</button>
                </div>`;
            modalOverlay.classList.add("active");
        }

        function closeModal() { document.getElementById("product-options-modal").classList.remove("active"); }

        function setOpt(element, key, value) {
            element.parentElement.querySelectorAll(".chip").forEach(ch => ch.classList.remove("active"));
            element.classList.add("active");
            selectedOptions[key] = value;
            let currentPrice = currentEditingProduct.price;
            if (selectedOptions.size === "Большой") currentPrice += 3;
            document.getElementById("modal-price-calc").innerText = `${currentPrice} с.`;
        }

        function setPaymentMethod(element, method) {
            element.parentElement.querySelectorAll(".chip").forEach(ch => ch.classList.remove("active"));
            element.classList.add("active");
            selectedPaymentMethod = method;
        }

        function submitProductWithOptions() {
            let finalPrice = currentEditingProduct.price;
            if (selectedOptions.size === "Большой") finalPrice += 3;
            
            const specsText = `${selectedOptions.size}, ${selectedOptions.temp || 'Холодный'}, Сахар: ${selectedOptions.sugar}, Лед: ${selectedOptions.ice}`;
            addToCartFinal(currentEditingProduct.id, currentEditingProduct.name, finalPrice, specsText);
            closeModal();
        }

        function addToCartFinal(pId, name, price, specs) {
            const existingIndex = cart.findIndex(item => item.id === pId && item.specs === specs);
            if (existingIndex > -1) cart[existingIndex].qty++;
            else cart.push({ id: pId, name: name, price: price, specs: specs, qty: 1 });
            updateCartUI();
        }

        function updateCartUI() {
            const bar = document.getElementById("cart-floating-bar");
            const badge = document.getElementById("cart-count-badge");
            const totalDisplay = document.getElementById("cart-total-display");
            let totalQty = 0; let totalPrice = 0;

            cart.forEach(item => { totalQty += item.qty; totalPrice += (item.price * item.qty); });

            if (totalQty > 0) {
                badge.innerText = totalQty;
                totalDisplay.innerText = `${totalPrice} с.`;
                bar.classList.add("active");
                document.getElementById("payment-box-section").style.display = "block";
            } else {
                bar.classList.remove("active");
                document.getElementById("payment-box-section").style.display = "none";
                toggleCartModal(false);
            }
            document.getElementById("cart-summary-total").innerText = `${totalPrice} с.`;
        }

        function toggleCartModal(show) {
            const modal = document.getElementById("cart-manager-modal");
            if (show) { renderCartItems(); modal.classList.add("active"); } 
            else modal.classList.remove("active");
        }

        function renderCartItems() {
            const container = document.getElementById("cart-items-container");
            if (cart.length === 0) { container.innerHTML = `<div style="text-align:center; color:var(--text-muted); margin-top:40px;">Корзина пуста</div>`; return; }
            let html = "";
            cart.forEach((item, index) => {
                html += `
                    <div class="cart-item-row">
                        <div class="cart-item-meta">
                            <h4>${item.name}</h4>
                            <p>${item.specs}</p>
                            <div style="font-weight:700; font-size:0.95rem; margin-top:4px; color:var(--luckin-orange);">${item.price * item.qty} с.</div>
                        </div>
                        <div class="cart-item-controls">
                            <button class="btn-qty" onclick="changeQty(${index}, -1)">-</button>
                            <span style="font-weight:700;">${item.qty}</span>
                            <button class="btn-qty" onclick="changeQty(${index}, 1)">+</button>
                        </div>
                    </div>`;
            });
            container.innerHTML = html;
        }

        function changeQty(index, delta) {
            cart[index].qty += delta;
            if (cart[index].qty <= 0) cart.splice(index, 1);
            updateCartUI();
            renderCartItems();
        }

        function placeOrderFinal() {
            if (cart.length === 0) return;
            let totalPrice = 0; let dataParts = [];

            cart.forEach(item => {
                totalPrice += (item.price * item.qty);
                let modsArray = [];
                if (item.specs.includes("Большой")) modsArray.push("*sizel");
                else if (item.specs.includes("Средний")) modsArray.push("*sizem");
                else if (item.specs.includes("Маленький")) modsArray.push("*sizes");
                let modsString = modsArray.length > 0 ? "_" + modsArray.join(",") : "";
                dataParts.push(`${item.id}_${item.qty}${modsString}`);
            });

            const cryptoData = dataParts.join('|');
            const baseUrl = `https://21nizom.github.io/XIZE/cashier.html`;
            const finalOrderUrl = `${baseUrl}?table=1&pay=${encodeURIComponent(selectedPaymentMethod)}&data=${encodeURIComponent(cryptoData)}`;

            const qrApiUrl = `https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=${encodeURIComponent(finalOrderUrl)}&color=000000&bgcolor=ffffff`;

            document.getElementById("qr-code-image-element").src = qrApiUrl;
            document.getElementById("qr-payment-method-status").innerText = `Оплата через: ${selectedPaymentMethod}`;
            document.getElementById("qr-modal-total-price").innerText = `Итого: ${totalPrice} с.`;

            document.getElementById("cart-manager-modal").classList.remove("active");
            document.getElementById("order-qr-modal").classList.add("active");
        }

        function cancelAndReturnToCart() {
            document.getElementById("order-qr-modal").classList.remove("active");
            document.getElementById("cart-manager-modal").classList.add("active");
        }
    </script>
