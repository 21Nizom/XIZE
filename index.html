<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XIZE Premium</title>
    <style>
        :root {
            --luckin-blue: #0b1430;       /* Тот самый глубокий, насыщенный темно-синий фон */
            --luckin-light-blue: #162454; /* Насыщенный синий для карточек */
            --luckin-orange: #ff3e6c;     /* Яркий неоновый акцент (розово-оранжевый неон) */
            --bg-dark: #060b1e;           /* Самый глубокий цвет для подложки */
            --card-bg: #121f4d;           /* Синие насыщенные карточки, никакого белого! */
            --text-light: #ffffff;        /* Чистый белый текст для контраста */
            --text-muted: #7a8ebf;        /* Спокойный сине-серый текст */
            --neon-glow: 0 0 15px rgba(255, 62, 108, 0.7); /* Тот самый неоновый шлейф */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* ОРИГИНАЛЬНЫЙ НЕОНОВЫЙ ХЕДЕР */
        header {
            background-color: var(--luckin-blue);
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 62, 108, 0.2);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        .brand-name {
            font-size: 1.4rem;
            font-weight: 900;
            color: #fff;
            letter-spacing: 0.5px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .brand-sub {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 500;
            opacity: 0.8;
        }

        /* ДВУХКОЛОНОЧНЫЙ БЛОК МЕНЮ */
        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
            background-color: var(--bg-dark);
        }

        /* БОКОВАЯ НАВИГАЦИЯ */
        .sidebar {
            width: 85px;
            background-color: rgba(11, 20, 48, 0.6);
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .nav-item {
            padding: 18px 4px;
            text-align: center;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            border-left: 4px solid transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .nav-item-icon {
            font-size: 1.5rem;
        }

        .nav-item.active {
            background-color: var(--card-bg);
            color: var(--luckin-orange);
            border-left-color: var(--luckin-orange);
            font-weight: 700;
            text-shadow: var(--neon-glow);
        }

        /* КОНТЕНТ МЕНЮ */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            padding-bottom: 140px;
            scroll-behavior: smooth;
        }

        .category-section {
            margin-bottom: 24px;
        }

        .category-section h2 {
            font-size: 1.05rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 12px;
            padding-left: 6px;
            border-left: 4px solid var(--luckin-orange);
            text-shadow: var(--neon-glow);
        }

        /* НЕОНОВАЯ СИНЯЯ КАРТОЧКА ТОВАРА */
        .product-card {
            background-color: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 12px;
            display: flex;
            gap: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            color: var(--text-light);
        }

        .product-img {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            flex-shrink: 0;
            background-color: rgba(255, 255, 255, 0.03) !important;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .product-details {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .product-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-light);
            line-height: 1.3;
        }

        .product-tag {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .product-price {
            font-size: 1.15rem;
            font-weight: 800;
            color: #fff;
        }

        .product-price span {
            font-size: 0.8rem;
            margin-left: 2px;
            color: var(--text-muted);
        }

        /* КНОПКА ПЛЮСА (КРЕАТИВ) С НЕОНОВЫМ СВЕЧЕНИЕМ */
        .btn-add {
            background-color: var(--luckin-orange);
            color: #fff;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-size: 1.2rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: var(--neon-glow);
            transition: transform 0.1s;
        }

        .btn-add:active {
            transform: scale(0.9);
        }

        /* ЭКРАНЫ ПРИЛОЖЕНИЯ */
        .app-screen {
            display: none;
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            text-align: center;
        }

        /* По умолчанию активен главный экран (приветствие) */
        .app-screen.active {
            display: block;
        }

        /* ОРИГИНАЛЬНАЯ ТЕМНАЯ НИЖНЯЯ НАВИГАЦИЯ */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 65px;
            background-color: var(--luckin-blue);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
            box-shadow: 0 -5px 25px rgba(0,0,0,0.6);
        }

        .bottom-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            gap: 4px;
            flex: 1;
            height: 100%;
            transition: all 0.2s;
        }

        .bottom-nav-item.active {
            color: var(--luckin-orange);
            font-weight: 700;
            text-shadow: var(--neon-glow);
        }

        .bottom-nav-item span:first-child {
            font-size: 1.3rem;
        }

        /* МОДАЛКА НАСТРОЕК (КРЕАТИВ) */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0,0,0,0.7);
            z-index: 200;
            display: none;
            align-items: flex-end;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background-color: var(--luckin-blue);
            border-top: 2px solid var(--luckin-orange);
            box-shadow: 0 -5px 25px rgba(255, 62, 108, 0.3);
            width: 100%;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            padding: 20px;
            max-height: 80vh;
            overflow-y: auto;
            color: var(--text-light);
            text-align: left;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 1.15rem;
            font-weight: 800;
        }

        .btn-close-modal {
            background: none;
            border: none;
            font-size: 1.6rem;
            color: var(--text-muted);
            cursor: pointer;
        }

        .option-group {
            margin-bottom: 18px;
        }

        .option-label {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .option-selector-chips {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .chip {
            background-color: var(--luckin-light-blue);
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.2s;
        }

        .chip.active {
            background-color: rgba(255, 62, 108, 0.15);
            color: var(--luckin-orange);
            border-color: var(--luckin-orange);
            box-shadow: 0 0 8px rgba(255, 62, 108, 0.3);
        }

        .modal-footer {
            margin-top: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-top: 16px;
        }

        .btn-submit-options {
            background-color: var(--luckin-orange);
            color: #fff;
            border: none;
            padding: 12px 28px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: var(--neon-glow);
        }

        /* ФЛАТТЕР-БАР КОРЗИНЫ */
        .cart-bar {
            position: fixed;
            bottom: 80px;
            left: 16px;
            right: 16px;
            background-color: var(--luckin-light-blue);
            border: 1px solid rgba(255, 62, 108, 0.3);
            border-radius: 30px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 8px 0 20px;
            z-index: 99;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            transform: translateY(150%);
            transition: transform 0.3s ease-in-out;
        }

        .cart-bar.active {
            transform: translateY(0);
        }

        .cart-info {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #fff;
            font-weight: 700;
        }

        .cart-badge {
            background-color: var(--luckin-orange);
            color: #fff;
            font-size: 0.75rem;
            font-weight: 800;
            padding: 2px 7px;
            border-radius: 10px;
            box-shadow: var(--neon-glow);
        }

        .btn-checkout {
            background-color: #fff;
            color: var(--luckin-blue);
            border: none;
            padding: 0 18px;
            height: 36px;
            border-radius: 18px;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
        }

        /* СТРАНИЦА КОРЗИНЫ */
        .cart-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--bg-dark);
            z-index: 150;
            display: none;
            flex-direction: column;
        }

        .cart-modal.active {
            display: flex;
        }

        .cart-modal-header {
            padding: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            gap: 16px;
            background-color: var(--luckin-blue);
            color: #fff;
        }

        .btn-back {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: #fff;
            cursor: pointer;
        }

        .cart-items-list {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .cart-item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 12px;
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            margin-bottom: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            text-align: left;
        }

        .cart-item-meta h4 {
            font-size: 0.95rem;
            font-weight: 700;
            color: #fff;
        }

        .cart-item-meta p {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .cart-item-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-qty {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: 1px solid var(--luckin-orange);
            background: none;
            color: var(--luckin-orange);
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 0 5px rgba(255, 62, 108, 0.2);
        }

        .cart-modal-footer {
            padding: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            background-color: var(--luckin-blue);
            padding-bottom: 30px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 14px;
        }

        .btn-order-now {
            width: 100%;
            background-color: var(--luckin-orange);
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: var(--neon-glow);
        }
    </style>
</head>
<body>

    <header>
        <div>
            <div class="brand-name">XIZE Premium</div>
            <div class="brand-sub">Luckin Coffee Cyber Style</div>
        </div>
    </header>

    <div id="screen-home" class="app-screen active">
        <div style="margin-top: 80px;">
            <span style="font-size: 4.5rem; filter: drop-shadow(0 0 15px rgba(255,62,108,0.4));">✨</span>
            <h2 style="margin-top: 20px; font-size: 1.7rem; letter-spacing: 0.5px; text-shadow: var(--neon-glow);">Добро пожаловать в XIZE</h2>
            <p style="color: var(--text-muted); margin-top: 12px; padding: 0 25px; font-size: 0.9rem; line-height: 1.5;">Насыщенный неоновый стиль, премиальный кокосовый кофе и атмосфера будущего.</p>
            <button onclick="switchMainScreen('menu')" style="margin-top: 35px; background: var(--luckin-orange); color:#fff; border:none; padding:14px 35px; border-radius:25px; font-weight:700; cursor:pointer; box-shadow: var(--neon-glow); font-size:0.95rem; transition: 0.2s;">Открыть Меню</button>
        </div>
    </div>

    <div id="screen-menu" class="main-layout app-screen" style="padding:0; text-align:left;">
        <aside class="sidebar" id="sidebar-menu"></aside>
        <main class="content" id="menu-content"></main>
    </div>

    <div id="screen-profile" class="app-screen">
        <div style="margin-top: 50px;">
            <div style="width: 90px; height: 90px; background: var(--card-bg); border-radius: 50%; margin: 0 auto; display:flex; align-items:center; justify-content:center; font-size: 2.5rem; border: 2px solid var(--luckin-orange); box-shadow: var(--neon-glow);">👤</div>
            <h3 style="margin-top: 16px; font-size: 1.3rem;">Постоянный Гость</h3>
            <p style="color: var(--luckin-orange); font-size: 0.85rem; font-weight:700; margin-top:4px; text-shadow: 0 0 5px rgba(255,62,108,0.4);">XIZE Cyber Club</p>
            
            <div style="margin-top: 30px; background: var(--card-bg); border: 1px solid rgba(255,255,255,0.05); border-radius:16px; padding: 18px; text-align: left; max-width: 320px; margin-left:auto; margin-right:auto; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">
                <div style="display:flex; justify-content:space-between; margin-bottom:14px; font-size:0.9rem; border-bottom:1px solid rgba(255,255,255,0.05); padding-bottom:10px;">
                    <span style="color:#fff;">История заказов</span><span style="color:var(--luckin-orange);">➔</span>
                </div>
                <div style="display:flex; justify-content:space-between; font-size:0.9rem;">
                    <span style="color:#fff;">Мои купоны</span><span style="color:var(--luckin-orange);">➔</span>
                </div>
            </div>
        </div>
    </div>

    <div class="cart-bar" id="cart-floating-bar">
        <div class="cart-info" onclick="toggleCartModal(true)">
            <span>🛒 Корзина</span>
            <span class="cart-badge" id="cart-count-badge">0</span>
        </div>
        <div style="display:flex; align-items:center; gap:15px;">
            <div style="font-weight:800; font-size:1.1rem; color:#fff;" id="cart-total-display">0 с.</div>
            <button class="btn-checkout" onclick="toggleCartModal(true)" style="background: var(--luckin-orange); color:#fff; box-shadow: var(--neon-glow);">Открыть</button>
        </div>
    </div>

    <div class="cart-modal" id="cart-manager-modal">
        <div class="cart-modal-header">
            <button class="btn-back" onclick="toggleCartModal(false)">←</button>
            <h3 style="font-size:1.1rem; text-shadow: var(--neon-glow);">Ваш Cyber Заказ</h3>
        </div>
        <div class="cart-items-list" id="cart-items-container"></div>
        <div class="cart-modal-footer">
            <div class="summary-row">
                <span>Всего к оплате:</span>
                <span id="cart-summary-total" style="color:var(--luckin-orange); text-shadow:var(--neon-glow);">0 с.</span>
            </div>
            <button class="btn-order-now" onclick="placeOrderFinal()">Заказать сейчас</button>
        </div>
    </div>

    <div class="modal-overlay" id="product-options-modal">
        <div class="modal-content" id="modal-content-area"></div>
    </div>

    <nav class="bottom-nav">
        <div class="bottom-nav-item active" id="btn-nav-home" onclick="switchMainScreen('home')">
            <span>🏠</span>
            <span>Главная</span>
        </div>
        <div class="bottom-nav-item" id="btn-nav-menu" onclick="switchMainScreen('menu')">
            <span>📋</span>
            <span>Меню</span>
        </div>
        <div class="bottom-nav-item" id="btn-nav-profile" onclick="switchMainScreen('profile')">
            <span>👤</span>
            <span>Профиль</span>
        </div>
    </nav>

            403: { name: "Супер Комбо XIZE", price: 40, cat: "fastfood", isFood: true, img: "🍱" },

            501: { name: "Tilami sue cup cake", price: 14, cat: "bakery", isFood: true, img: "🧁" },
            502: { name: "Banana cake", price: 12, cat: "bakery", isFood: true, img: "🍰" },
            503: { name: "Honey cloud cake", price: 15, cat: "bakery", isFood: true, img: "🎂" },
            504: { name: "Beef, cheese sandwich", price: 16, cat: "bakery", isFood: true, img: "🥪" },
            505: { name: "Raw coconut floss", price: 13, cat: "bakery", isFood: true, img: "🥮" },
            506: { name: "Basque cheese toast", price: 14, cat: "bakery", isFood: true, img: "🍞" }
        };

        let cart = [];
        let currentEditingProduct = null;
        let selectedOptions = { ice: "Нормально", sugar: "100%", size: "Стандарт" };
        let currentActiveTab = "home"; // По умолчанию открывается Главная

        window.onload = function() {
            renderSidebar();
            renderCatalog();
            setupScrollSpy();
        };

        function switchMainScreen(screenName) {
            currentActiveTab = screenName;
            
            document.querySelectorAll(".app-screen").forEach(el => {
                el.classList.remove("active");
                el.style.display = "none";
            });
            document.querySelectorAll(".bottom-nav-item").forEach(el => el.classList.remove("active"));

            const targetScreen = document.getElementById(`screen-${screenName}`);
            const targetButton = document.getElementById(`btn-nav-${screenName}`);
            
            if (screenName === 'menu') {
                targetScreen.style.display = "flex";
            } else {
                targetScreen.style.display = "block";
            }
            
            targetScreen.classList.add("active");
            if (targetButton) targetButton.classList.add("active");
        }

        function renderSidebar() {
            const sidebar = document.getElementById("sidebar-menu");
            let html = "";
            let isFirst = true;
            for (let key in categories) {
                html += `
                    <div class="nav-item ${isFirst ? 'active' : ''}" id="nav-${key}" onclick="scrollToCategory('${key}')">
                        <span class="nav-item-icon">${categories[key].icon}</span>
                        <span>${categories[key].name}</span>
                    </div>
                `;
                isFirst = false;
            }
            sidebar.innerHTML = html;
        }

        function renderCatalog() {
            const container = document.getElementById("menu-content");
            let html = "";
            for (let catKey in categories) {
                html += `
                    <section class="category-section" id="sec-${catKey}">
                        <h2>${categories[catKey].name}</h2>
                `;
                for (let pId in productsDB) {
                    const product = productsDB[pId];
                    if (product.cat === catKey) {
                        html += `
                            <div class="product-card">
                                <div class="product-img">
                                    ${product.img}
                                </div>
                                <div class="product-details">
                                    <div>
                                        <div class="product-title">${product.name}</div>
                                        <div class="product-tag">Premium Choice</div>
                                    </div>
                                    <div class="product-footer">
                                        <div class="product-price">${product.price}<span>с.</span></div>
                                        <button class="btn-add" onclick="openProductConfig(${pId})">+</button>
                                    </div>
                                </div>
                            </div>
                        `;
                    }
                }
                html += `</section>`;
            }
            container.innerHTML = html;
        }

        function scrollToCategory(catKey) {
            const target = document.getElementById(`sec-${catKey}`);
            if (target) {
                target.scrollIntoView({ behavior: 'smooth' });
                updateActiveTab(catKey);
            }
        }

        function updateActiveTab(catKey) {
            document.querySelectorAll(".nav-item").forEach(el => el.classList.remove("active"));
            const currentTab = document.getElementById(`nav-${catKey}`);
            if (currentTab) currentTab.classList.add("active");
        }

        function setupScrollSpy() {
            const contentArea = document.getElementById("menu-content");
            contentArea.addEventListener("scroll", () => {
                if (currentActiveTab !== 'menu') return;

                let currentSection = "";
                document.querySelectorAll(".category-section").forEach(sec => {
                    const top = sec.offsetTop - 140;
                    if (contentArea.scrollTop >= top) {
                        currentSection = sec.id.replace("sec-", "");
                    }
                });
                if (currentSection) updateActiveTab(currentSection);
            });
        }

        /* МОДАЛКА КРЕАТИВ (УДАЛЕНО ВСЁ БЕЛОЕ) */
        function openProductConfig(pId) {
            const product = productsDB[pId];
            currentEditingProduct = { id: pId, ...product };
            selectedOptions = { ice: "Нормально", sugar: "100%", size: "Стандарт" };

            if (product.isFood) {
                addToCartFinal(pId, product.name, product.price, "Порция");
                return;
            }

            const modalOverlay = document.getElementById("product-options-modal");
            const contentArea = document.getElementById("modal-content-area");

            contentArea.innerHTML = `
                <div class="modal-header">
                    <div>
                        <div class="modal-title">${product.name}</div>
                        <div style="font-size:0.9rem; color:var(--luckin-orange); font-weight:700; margin-top:4px;">${product.price} с.</div>
                    </div>
                    <button class="btn-close-modal" onclick="closeModal()">×</button>
                </div>
                
                <div class="option-group">
                    <div class="option-label">Размер</div>
                    <div class="option-selector-chips">
                        <div class="chip active" onclick="setOpt(this, 'size', 'Стандарт')">Стандарт</div>
                        <div class="chip" onclick="setOpt(this, 'size', 'Большой')">Большой (+3с)</div>
                    </div>
                </div>

                <div class="option-group">
                    <div class="option-label">Креатив: Лед</div>
                    <div class="option-selector-chips">
                        <div class="chip active" onclick="setOpt(this, 'ice', 'Нормально')">Нормальный лед</div>
                        <div class="chip" onclick="setOpt(this, 'ice', 'Мало льда')">Мало льда</div>
                        <div class="chip" onclick="setOpt(this, 'ice', 'Горячий')">Горячий</div>
                    </div>
                </div>

                <div class="option-group">
                    <div class="option-label">Креатив: Сладость</div>
                    <div class="option-selector-chips">
                        <div class="chip active" onclick="setOpt(this, 'sugar', '100%')">Стандарт (100%)</div>
                        <div class="chip" onclick="setOpt(this, 'sugar', '70%')">70% сахара</div>
                        <div class="chip" onclick="setOpt(this, 'sugar', 'Без сахара')">Без сахара</div>
                    </div>
                </div>

                <div class="modal-footer">
                    <div style="font-size:1.15rem; font-weight:800; color:#fff;" id="modal-price-calc">${product.price} с.</div>
                    <button class="btn-submit-options" onclick="submitProductWithOptions()">Добавить</button>
                </div>
            `;
            modalOverlay.classList.add("active");
        }

        function closeModal() {
            document.getElementById("product-options-modal").classList.remove("active");
        }

        function setOpt(element, key, value) {
            element.parentElement.querySelectorAll(".chip").forEach(ch => ch.classList.remove("active"));
            element.classList.add("active");
            selectedOptions[key] = value;

            let currentPrice = currentEditingProduct.price;
            if (selectedOptions.size === "Большой") currentPrice += 3;
            document.getElementById("modal-price-calc").innerText = `${currentPrice} с.`;
        }

        function submitProductWithOptions() {
            let finalPrice = currentEditingProduct.price;
            if (selectedOptions.size === "Большой") finalPrice += 3;

            const specsText = `${selectedOptions.size}, Лёд: ${selectedOptions.ice}, Сахар: ${selectedOptions.sugar}`;
            addToCartFinal(currentEditingProduct.id, currentEditingProduct.name, finalPrice, specsText);
            closeModal();
        }

        function addToCartFinal(pId, name, price, specs) {
            const existingIndex = cart.findIndex(item => item.id === pId && item.specs === specs);
            if (existingIndex > -1) {
                cart[existingIndex].qty++;
            } else {
                cart.push({ id: pId, name: name, price: price, specs: specs, qty: 1 });
            }
            updateCartUI();
        }

        function updateCartUI() {
            const bar = document.getElementById("cart-floating-bar");
            const badge = document.getElementById("cart-count-badge");
            const totalDisplay = document.getElementById("cart-total-display");

            let totalQty = 0;
            let totalPrice = 0;

            cart.forEach(item => {
                totalQty += item.qty;
                totalPrice += (item.price * item.qty);
            });

            if (totalQty > 0) {
                badge.innerText = totalQty;
                totalDisplay.innerText = `${totalPrice} с.`;
                bar.classList.add("active");
            } else {
                bar.classList.remove("active");
                toggleCartModal(false);
            }

            document.getElementById("cart-summary-total").innerText = `${totalPrice} с.`;
        }

        function toggleCartModal(show) {
            const modal = document.getElementById("cart-manager-modal");
            if (show) {
                renderCartItems();
                modal.classList.add("active");
            } else {
                modal.classList.remove("active");
            }
        }

        function renderCartItems() {
            const container = document.getElementById("cart-items-container");
            if (cart.length === 0) {
                container.innerHTML = `<div style="text-align:center; color:var(--text-muted); margin-top:40px;">Корзина пуста</div>`;
                return;
            }

            let html = "";
            cart.forEach((item, index) => {
                html += `
                    <div class="cart-item-row">
                        <div class="cart-item-meta">
                            <h4>${item.name}</h4>
                            <p>${item.specs}</p>
                            <div style="font-weight:700; font-size:0.95rem; margin-top:4px; color:var(--luckin-orange);">${item.price * item.qty} с.</div>
                        </div>
                        <div class="cart-item-controls">
                            <button class="btn-qty" onclick="changeQty(${index}, -1)">-</button>
                            <span style="font-weight:700; color:#fff;">${item.qty}</span>
                            <button class="btn-qty" onclick="changeQty(${index}, 1)">+</button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function changeQty(index, delta) {
            cart[index].qty += delta;
            if (cart[index].qty <= 0) {
                cart.splice(index, 1);
            }
            updateCartUI();
            renderCartItems();
        }

        function placeOrderFinal() {
            alert("Заказ успешно отправлен! Спасибо за покупку в XIZE Premium!");
            cart = [];
            updateCartUI();
        }
    </script>
</body>
</html>
