<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XIZE - Панель Кассира</title>
    <style>
        :root {
            --luckin-blue: #0b1430;       
            --luckin-light-blue: #162454; 
            --luckin-orange: #00f0ff;     
            --bg-dark: #060b1e;           
            --card-bg: #121f4d;           
            --text-light: #ffffff;        
            --text-muted: #7a8ebf;        
            --neon-glow: 0 0 15px rgba(0, 240, 255, 0.7); 
        }

        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background-color: var(--bg-dark); 
            padding: 20px; 
            margin: 0; 
            color: var(--text-light); 
        }

        .cashier-container { 
            max-width: 500px; 
            background: var(--luckin-blue); 
            margin: 20px auto; 
            border-radius: 24px; 
            padding: 25px; 
            border: 1px solid rgba(0, 240, 255, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.6); 
        }

        h2 { 
            margin-top: 0; 
            font-weight: 900; 
            border-bottom: 2px solid rgba(0, 240, 255, 0.2); 
            padding-bottom: 14px; 
            color: #fff; 
            display: flex; 
            justify-content: space-between; 
            text-shadow: var(--neon-glow);
        }

        .info-row { 
            display: flex; 
            justify-content: space-between; 
            margin: 10px 0; 
            font-size: 0.95rem; 
            background: var(--card-bg); 
            padding: 12px 14px; 
            border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.05);
        }

        .info-value { 
            font-weight: 700; 
            color: var(--luckin-orange); 
            text-shadow: 0 0 5px rgba(0,240,255,0.4);
        }

        .order-item { 
            padding: 14px 4px; 
            border-bottom: 1px dashed rgba(255,255,255,0.1); 
        }

        .item-main { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }

        .item-name { 
            font-weight: 700; 
            font-size: 1rem; 
            color: #fff; 
        }

        .item-mods { 
            font-size: 0.8rem; 
            color: var(--text-muted); 
            margin-top: 6px; 
            padding-left: 6px; 
        }

        .item-price { 
            font-weight: 800; 
            color: var(--luckin-orange); 
        }

        .delete-btn { 
            background: rgba(239, 68, 68, 0.2); 
            color: #ef4444; 
            border: 1px solid #ef4444; 
            width: 26px; 
            height: 26px; 
            border-radius: 50%; 
            font-weight: bold; 
            cursor: pointer; 
        }

        .total-section { 
            margin-top: 25px; 
            padding-top: 15px; 
            border-top: 2px solid rgba(0, 240, 255, 0.2); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }

        .total-price { 
            font-size: 1.7rem; 
            font-weight: 900; 
            color: var(--luckin-orange); 
            text-shadow: var(--neon-glow);
        }

        .action-btn { 
            background-color: var(--luckin-orange); 
            color: #060b1e; 
            border: none; 
            width: 100%; 
            padding: 16px; 
            border-radius: 16px; 
            font-size: 1.05rem; 
            font-weight: 700; 
            margin-top: 20px; 
            cursor: pointer; 
            box-shadow: var(--neon-glow);
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="cashier-container">
        <h2>Монитор Кассы XIZE 💸 <span id="top-table" style="color: var(--text-muted); font-size:1rem;"></span></h2>
        
        <div id="order-info-block">
            <div class="info-row"><span>Номер стола:</span><span class="info-value" id="info-table">-</span></div>
            <div class="info-row"><span>Способ оплаты:</span><span class="info-value" id="info-payment">-</span></div>
            <div style="font-weight: 800; margin: 20px 0 8px 0; color: #fff; text-shadow: 0 0 5px rgba(0,240,255,0.2);">Детализация чека:</div>
            
            <div id="order-items-list"></div>
            
            <div class="total-section">
                <div>Итого к выдаче:</div>
                <div class="total-price"><span id="info-total">0</span> с.</div>
            </div>
            <button class="action-btn" onclick="completeOrder()">✅ Выдать заказ на кухню</button>
        </div>

        <div id="error-block" class="hidden" style="text-align:center; color: var(--text-muted); padding:40px 20px;">
            <span style="font-size: 4rem; filter: drop-shadow(0 0 10px rgba(0,240,255,0.3));">📥</span>
            <h3 style="margin-top: 15px; color:#fff;">Ждем сканирования QR...</h3>
        </div>
    </div>

    <script>
        const productsDB = {
            101: { name: "Raw coconut latte (pioneer)", price: 16 }, 102: { name: "Coconut ice from the American", price: 14 },
            103: { name: "Light coconut jasmine latte", price: 17 }, 104: { name: "Ice-smoked coconut latte", price: 18 },
            105: { name: "A Raised Coconut Trio Latte", price: 19 }, 106: { name: "Raw Coconut Velvet Latte", price: 17 },
            107: { name: "Meteorite latte", price: 18 }, 108: { name: "Black Sugar latte", price: 16 },
            110: { name: "Muscatine cheese latte", price: 19 }, 113: { name: "Velvet latte", price: 15 },
            116: { name: "Standard American Style", price: 11 }, 126: { name: "Cappuccino", price: 14 },
            201: { name: "Coconut cloud matcha", price: 17 }, 202: { name: "Cheddar cheese matcha", price: 18 },
            205: { name: "Matcha latte", price: 15 }, 301: { name: "Little orange iced tea", price: 12 },
            302: { name: "Grape iced tea", price: 13 }, 401: { name: "Шаурма Классическая", price: 25 },
            402: { name: "Плов Лазер (Говядина)", price: 30 }, 501: { name: "Tilami sue cup cake", price: 14 }
        };

        const modsDB = {
            "sizem": { name: "M (Средний)", price: 0 }, "sizel": { name: "L (Большой)", price: 3 },
            "cold": { name: "Холодный", price: 0 }, "hot": { name: "Горячий", price: 0 }
        };

        let activeOrder = [];

        function parseUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            const table = urlParams.get('table');
            const payment = urlParams.get('pay') || 'Наличные';
            const data = urlParams.get('data');

            if (!table || !data) {
                document.getElementById('order-info-block').classList.add('hidden');
                document.getElementById('error-block').classList.remove('hidden');
                return;
            }

            document.getElementById('info-table').innerText = "Стол №" + table;
            document.getElementById('top-table').innerText = "Стол №" + table;
            document.getElementById('info-payment').innerText = payment;

            const itemsArray = data.split('|');
            activeOrder = [];

            itemsArray.forEach(itemStr => {
                const parts = itemStr.split('_');
                const id = parseInt(parts[0]);
                const qty = parseInt(parts[1]);
                const modsString = parts[2] || "";

                if (productsDB[id]) {
                    let parsedMods = [];
                    let extraCost = 0;

                    if(modsString) {
                        modsString.split(',').forEach(mId => {
                            const cleanId = mId.substring(1);
                            if(modsDB[cleanId]) {
                                parsedMods.push({ name: modsDB[cleanId].name });
                                extraCost += modsDB[cleanId].price;
                            }
                        });
                    }
                    activeOrder.push({ id: id, qty: qty, mods: parsedMods, singlePrice: productsDB[id].price + extraCost });
                }
            });
            renderOrder();
        }

        function renderOrder() {
            const listContainer = document.getElementById('order-items-list');
            listContainer.innerHTML = "";
            let totalSum = 0;

            activeOrder.forEach((item, index) => {
                const prod = productsDB[item.id];
                const itemSum = item.singlePrice * item.qty;
                totalSum += itemSum;

                let modsHtml = "";
                if(item.mods.length > 0) {
                    modsHtml += `<div class="item-mods">`;
                    item.mods.forEach(m => { modsHtml += `<div>• ${m.name}</div>`; });
                    modsHtml += `</div>`;
                }

                listContainer.innerHTML += `
                    <div class="order-item">
                        <div class="item-main">
                            <div class="item-name">${prod.name} (x${item.qty})</div>
                            <div style="display:flex; align-items:center; gap:10px;">
                                <div class="item-price">${itemSum} с.</div>
                                <button class="delete-btn" onclick="removeItem(${index})">×</button>
                            </div>
                        </div>
                        ${modsHtml}
                    </div>`;
            });
            document.getElementById('info-total').innerText = totalSum;
        }

        function removeItem(index) { activeOrder.splice(index, 1); renderOrder(); }

        function completeOrder() {
            alert("Заказ отправлен в печать на кухню! 🚀");
            document.getElementById('order-info-block').classList.add('hidden');
            const errorBlock = document.getElementById('error-block');
            errorBlock.innerHTML = `
                <span style="font-size: 4rem;">🎉</span>
                <h3 style="color: #00f0ff; margin-top: 10px; text-shadow: var(--neon-glow);">Заказ успешно выдан!</h3>
                <p style="color: var(--text-muted); font-size: 0.9rem;">Окно готово к приему следующего QR-кода.</p>
            `;
            errorBlock.classList.remove('hidden');
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        window.onload = parseUrl;
    </script>
</body>
</html>
